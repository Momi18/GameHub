<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub | Snake</title>
<link rel="stylesheet" href="Styles.css">
<script src="Snake.js"></script>
</head>

<body>
    <div class="header">
        <div class="title">
            <a href="index.html" class="home-link">
                <h1>GameHub</h1>
            </a>
        </div>

        <div class="searchbox-container">
            <input type="text" placeholder="Search games..." class="searchbox">
        </div>
    </div>

    <h1 class="GameHead">Sssnake</h1>
    <canvas id="map"></canvas>
    <h3>Score = <span id="sc"></span></h3>
    <script>
        document.getElementById("sc").innerText = window.Score;
    </script>
    <h3><br>Movement<br>
        ↑ - Up&emsp;
        ↓ - Down&emsp;
        ← - Left&emsp;
        → - Right<br>
        Map Size<br>
        s - Small&emsp;
        m - Medium&emsp;
        l - Large<br>

        
    </h3>
</body>

</html>
