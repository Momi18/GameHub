<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub | Dino</title>
<link rel="stylesheet" href="Styles.css">
</head>
<body>
    <div class="header">
        <div class="title">
            <a href="index.html" class="home-link">
                <h1>GameHub</h1>
            </a>
        </div>

        <div class="searchbox-container">
            <input type="text" placeholder="Search games..." class="searchbox">
        </div>
    </div>

    <h1 class="GameHead">Dino</h1> 
    <div class="dino-wrapper">
        <div id="dino-msg" class="msg-container hide">
            <p>Whoops! Game Over :(</p>
            <button id="retry-btn">Try Again</button>
        </div>

        <div id="dino"></div>
        <div id="cactus"></div>
    </div>
    <script src="Dino.js"></script>
</body>
</html>
